name: EKS Argocd Pipeline

on:
  push:
    branches: [ "main" ]

env:
  REPO_NAME: eks-argocd-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    # Gives the workflow permission to commit changes back to the repository
    permissions:
      contents: write

    steps:
    - name: Code Checkout
      uses: actions/checkout@v4

    - name: Set Short SHA
      id: vars
      run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.REPO_NAME }}:${{ env.SHORT_SHA }}

    - name: Update Kubernetes Deployment Image Tag
      run: |
        # Use sed to find the image line and replace the tag with the new SHORT_SHA
        # Ensure k8s/deployment.yaml matches the exact path in your repository
        sed -i "s|image: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.REPO_NAME }}:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.REPO_NAME }}:${{ env.SHORT_SHA }}|g" k8s/deployment.yaml

    - name: Commit and Push Changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add k8s/deployment.yaml
        
        # Check if there are any staged changes before committing
        if ! git diff --cached --quiet; then
          git commit -m "Deploy: Update image tag to $SHORT_SHA [skip ci]"
          git push
        else
          echo "No changes detected in deployment.yaml. Skipping commit."
        fi