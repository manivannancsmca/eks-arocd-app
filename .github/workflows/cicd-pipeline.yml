name: EKS Argocd Pipeline

on:
  push:
    branches: [ "main" ]

env:
  REPO_NAME: eks-argocd-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    # Gives the workflow permission to commit changes back to the repository
    permissions:
      contents: write

    steps:
    - name: Code Checkout
      uses: actions/checkout@v4

    - name: Set Short SHA
      id: vars
      run: echo "SHORT_SHA=${GITHUB_SHA::7}" >> $GITHUB_ENV

    - name: Log in to Docker Hub
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKERHUB_USERNAME }}
        password: ${{ secrets.DOCKERHUB_TOKEN }}

    - name: Build and Push Docker Image
      uses: docker/build-push-action@v6
      with:
        context: .
        push: true
        tags: |
          ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.REPO_NAME }}:${{ env.SHORT_SHA }}

    # New Step: Update the deployment.yaml file with the new short SHA tag
    - name: Update Kubernetes Deployment Image Tag
      run: |
        # Use sed to find the image line and replace the tag with the new SHORT_SHA
        # Adjust the path 'k8s/deployment.yaml' to match where your file lives
        sed -i "s|image: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.REPO_NAME }}:.*|image: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.REPO_NAME }}:${{ env.SHORT_SHA }}|g" k8s/deployment.yaml

    # New Step: Push the updated deployment file back to GitHub
    - name: Commit and Push Changes
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add k8s/deployment.yaml
        git commit -m "Deploy: Update image tag to ${ { env.SHORT_SHA } } [skip ci]"
        git push