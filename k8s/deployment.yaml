apiVersion: apps/v1
kind: Deployment
metadata:
  name: eks-argocd-app
  namespace: default
  labels:
    app: eks-argocd-app
spec:
  replicas: 2 
  selector:
    matchLabels:
      app: eks-argocd-app
  template:
    metadata:
      labels:
        app: eks-argocd-app
    spec:
      containers:
        - name: eks-argocd-app
          # Fixed spelling: 'arocd' to 'argocd' to match your GitHub workflow env variable
          image: manivannancsmca/eks-argocd-app:f400087
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8086 
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8086
            initialDelaySeconds: 20 
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8086
            initialDelaySeconds: 30
            periodSeconds: 15